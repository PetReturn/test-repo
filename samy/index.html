<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hund gefunden</title>

<style>
body{margin:0;font-family:Arial;background:#f0f9ff;display:flex;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:30px;max-width:420px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.15)}
.headline{font-size:30px;font-weight:800}
.success{background:#e0f2fe;padding:10px;border-radius:10px;margin:10px 0}
.dog-name{font-size:24px;font-weight:700}
img{width:90%;border-radius:14px;margin:15px 0}
.button{display:block;padding:16px;margin:10px 0;background:#06b6d4;color:white;text-decoration:none;border-radius:12px}
.whatsapp{background:#22c55e}
</style>

</head>

<body>

<div class="card">

<div class="headline">🐶 Hund gefunden?</div>

<div class="success">💙 Danke für deine Hilfe</div>

<div class="dog-name">Hallo, ich bin Samy</div>

<img src="test-Bild.png">

<p>Ich habe mich verlaufen. Bitte hilf mir!</p>

<a class="button" href="tel:+491701692197">📞 Besitzer anrufen</a>

<a class="button whatsapp" href="#" onclick="sendWhatsApp()">💬 WhatsApp</a>

</div>

<script>
function sendWhatsApp(){
const phone="491701692197";
const msg=`Hallo! Ich habe Ihren Hund Samy gefunden 🐶`;
window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
