<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hund gefunden</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f0f9ff;
color:#1e293b;
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
box-sizing:border-box;
}

.card{
background:white;
border-radius:20px;
padding:30px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.headline{
font-size:30px;
font-weight:800;
margin-bottom:10px;
color:#0f172a;
}

.success{
background:#e0f2fe;
padding:10px;
border-radius:10px;
margin-bottom:15px;
font-size:14px;
font-weight:600;
}

.dog-name{
font-size:24px;
font-weight:700;
margin-bottom:15px;
}

.subtitle{
opacity:0.8;
margin-bottom:20px;
}

.info-box{
background:#e0f7fa;
border-radius:12px;
padding:12px;
font-size:14px;
margin-bottom:20px;
}

img{
width:90%;
max-width:340px;
height:auto;
border-radius:14px;
border:3px solid white;
margin-bottom:20px;
}

.button{
display:block;
padding:16px;
border-radius:12px;
margin:10px 0;
font-weight:bold;
text-decoration:none;
color:white;
}

.call{background:#06b6d4;}
.whatsapp{background:#22d3ee;}
.location{background:#bfdbfe;color:#1e3a8a;}

</style>

</head>

<body>

<div class="card">

<div class="headline">🐶 Hund gefunden?</div>

<div class="success">💙 Danke! Du hast mir geholfen</div>

<div class="dog-name">Hallo, mein Name ist harry</div>

<img src="test-Bild.png" alt="Hund">

<div class="subtitle">
Ich habe mich verlaufen. Bitte hilf mir nach Hause!
</div>

<div class="info-box">
📞 Ruf bitte an oder sende eine Nachricht  
</div>

<a class="button call" href="tel:++491701692197">
📞 Besitzer anrufen
</a>

<a class="button whatsapp" href="#" onclick="sendWhatsApp()">
💬 WhatsApp
</a>

<button class="button location" onclick="sendLocation()">
📍 Standort senden
</button>

<script>

function sendWhatsApp(){
const phone="+491701692197";
const message=`Hallo! Ich habe Ihren Hund harry gefunden 🐶`;
window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`);
}

function sendLocation(){
navigator.geolocation.getCurrentPosition(function(pos){
const lat = pos.coords.latitude;
const lon = pos.coords.longitude;

const phone="+491701692197";

const message=`Standort: https://maps.google.com/?q=${lat},${lon}`;

window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`);
});
}

</script>

</div>

</body>
</html>
