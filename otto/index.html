<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hund gefunden</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f0f9ff;
color:#1e293b;
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
box-sizing:border-box;
}

.card{
background:white;
border-radius:20px;
padding:30px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.headline{
font-size:30px;
font-weight:800;
margin-bottom:10px;
color:#0f172a;
}

.success{
background:#e0f2fe;
padding:10px;
border-radius:10px;
margin-bottom:15px;
font-size:14px;
font-weight:600;
}

.dog-name{
font-size:24px;
font-weight:700;
margin-bottom:15px;
}

.subtitle{
opacity:0.8;
margin-bottom:20px;
}

.info-box{
background:#e0f7fa;
border-radius:12px;
padding:12px;
font-size:14px;
margin-bottom:20px;
}

.emotional{
margin-top:15px;
font-size:15px;
}

.trust{
margin-top:10px;
font-size:13px;
opacity:0.7;
}

img{
width:90%;
max-width:340px;
height:auto;
border-radius:14px;
border:3px solid white;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
margin-bottom:20px;
}

.button{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
padding:16px;
border-radius:12px;
margin:10px 0;
font-weight:bold;
border:none;
cursor:pointer;
transition:all 0.2s ease;
color:white;
}

.button:hover{
transform:scale(1.04);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.call{
background:#06b6d4;
font-size:18px;
padding:18px;
}

.whatsapp{
background:#22d3ee;
}

.location{
background:#bfdbfe;
color:#1e3a8a;
font-size:14px;
padding:14px;
}

.map{
margin-top:15px;
width:100%;
height:250px;
border-radius:12px;
border:none;
display:none;
opacity:0;
transition:opacity 0.4s ease;
}

.map.show{
display:block;
opacity:1;
}

.warning{
margin-top:15px;
font-size:14px;
color:#b91c1c;
font-weight:bold;
}

footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="card">

<div class="headline">🐶 Hund gefunden?</div>
<div class="success">💙 Danke! Du hast mir gerade sehr geholfen</div>
<div class="dog-name">Hallo, mein Name ist Otto</div>

<img src="dog.png">

<a class="button call" href="tel:++491701692197">
📞 Besitzer anrufen
</a>

</div>

</body>
</html>
